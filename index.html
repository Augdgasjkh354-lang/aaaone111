<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>临安一日 · 生存骨架</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <button type="button" id="tianjiMark" class="tianji-mark" aria-label="天机">天机</button>
    <main class="app-shell" id="app">
      <header class="top-bar">
        <div class="time-readout" aria-live="polite">
          <div class="date-line" id="dateLine">载入中</div>
          <div class="time-line" id="timeLine">晨 06:00</div>
        </div>
        <div class="time-controls" aria-label="时间控制">
          <label for="speedSelect">流速</label>
          <select id="speedSelect">
            <option value="0">一档</option>
            <option value="1">二档</option>
            <option value="2">三档</option>
            <option value="3">四档</option>
            <option value="4">五档</option>
          </select>
          <button type="button" id="pauseButton" class="small-button">暂停</button>
          <button type="button" id="settingsButton" class="gear-button" aria-label="设置">⚙</button>
        </div>
      </header>

      <section class="panel status-panel" aria-labelledby="statusTitle">
        <h1 id="statusTitle">临安求生</h1>
        <p class="flavor">南宋临安，晨雾未散。你只是城中一介普通人，先要活过今日。</p>
        <div class="status-grid" id="statusGrid"></div>
      </section>

      <section class="panel narrative-panel" aria-labelledby="narrativeTitle">
        <h2 id="narrativeTitle">叙事</h2>
        <div class="story-log" id="storyLog" aria-live="polite"></div>
      </section>

      <section class="panel money-panel" aria-labelledby="moneyTitle">
        <h2 id="moneyTitle">钱财</h2>
        <div class="money-row" id="moneyRow"></div>
      </section>

      <section class="panel action-panel" aria-labelledby="actionTitle">
        <h2 id="actionTitle">行动</h2>
        <p class="action-note" id="actionNote">请选择接下来做什么。</p>
        <div class="travel-panel">
          <button type="button" id="travelToggleButton" class="travel-toggle">出行</button>
          <div class="travel-list hidden" id="travelList" aria-live="polite"></div>
          <button type="button" id="cancelTravelButton" class="cancel-travel hidden">取消赶路</button>
        </div>
        <div class="action-grid">
          <button type="button" data-action="eat">吃饭（10文）</button>
          <button type="button" data-action="sleep">睡觉</button>
          <button type="button" data-action="work">活计</button>
          <button type="button" id="studyToggleButton">修习</button>
          <button type="button" id="purchaseToggleButton">购置</button>
          <button type="button" id="repairToggleButton">修整</button>
          <button type="button" id="inventoryButton">背包</button>
        </div>
        <div class="work-list hidden" id="workList" aria-live="polite"></div>
        <div class="work-list hidden" id="studyList" aria-live="polite"></div>
        <div class="work-list hidden" id="purchaseList" aria-live="polite"></div>
        <div class="work-list hidden" id="repairList" aria-live="polite"></div>
        <div class="work-list hidden" id="inventoryList" aria-live="polite"></div>
        <form class="free-action-form" id="freeActionForm">
          <label for="freeActionInput">自由行动</label>
          <textarea id="freeActionInput" rows="3" placeholder="例如：我去米市看看粮价"></textarea>
          <button type="submit" id="freeActionButton">行动</button>
        </form>
        <button type="button" id="restartButton" class="restart-button">重开</button>
      </section>
    </main>

    <div class="settings-overlay hidden" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-card">
        <h2 id="settingsTitle">设置</h2>
        <label for="apiKeyInput">DeepSeek API Key</label>
        <input type="password" id="apiKeyInput" autocomplete="off" />
        <label for="thinkingModeSelect">思考模式</label>
        <select id="thinkingModeSelect">
          <option value="disabled">无思考</option>
          <option value="high">思考</option>
          <option value="max">最大思考</option>
        </select>
        <label for="housingSelect">住所</label>
        <select id="housingSelect">
          <option value="露宿">露宿</option>
          <option value="破庙">破庙</option>
          <option value="租屋">租屋</option>
        </select>
        <div class="settings-actions">
          <button type="button" id="saveSettingsButton">保存</button>
          <button type="button" id="householdRegistrationButton">办附籍</button>
          <button type="button" id="neighborStatusButton">街坊近况</button>
          <button type="button" id="businessLedgerButton">生意账</button>
          <button type="button" id="justiceButton">官面</button>
          <button type="button" id="routineButton">起居</button>
          <button type="button" id="tianjiPanelButton">天机页</button>
          <button type="button" id="viewAuditLogButton">查看日志</button>
          <button type="button" id="closeSettingsButton">关闭</button>
        </div>
        <div class="audit-log hidden" id="neighborStatusLog"></div>
        <div class="audit-log hidden" id="businessLedgerLog"></div>
        <div class="audit-log hidden" id="justiceLog"></div>
        <div class="audit-log hidden" id="routinePanel">
          <p>
            <label><input type="checkbox" id="routineAutoEat" /> 自动吃饭</label>
            <select id="routineMealType"><option value="rough">粗饭</option><option value="fine">像样饭</option></select>
          </p>
          <p>
            <label><input type="checkbox" id="routineAutoSleep" /> 自动睡觉</label>
            <label><input type="checkbox" id="routineAutoBath" /> 自动洗浴</label>
            <label><input type="checkbox" id="routineAutoDues" /> 自动续租/发薪/例钱</label>
          </p>
          <p>
            <label><input type="checkbox" id="routineBreakFestival" /> 节庆首日打断</label>
            <label><input type="checkbox" id="routineMonthlySummary" /> 月度起居注</label>
          </p>
          <p>晨 <select id="routineSchedule晨"></select> 午 <select id="routineSchedule午"></select> 暮 <select id="routineSchedule暮"></select> 夜 <select id="routineSchedule夜"></select></p>
          <p>连续 <input type="number" id="routineDaysInput" min="1" max="30" value="30" /> 日
            <button type="button" id="saveRoutineButton">保存起居</button>
            <button type="button" id="startRoutineButton">过日子</button>
            <button type="button" id="stopRoutineButton">暂停</button>
          </p>
          <div id="routineLog"></div>
        </div>
        <div class="audit-log hidden" id="tianjiPanel">
          <p id="tianjiStatus">天机未开。</p>
          <p>天机开启时，自由行动输入将发往专用解析器，生成变更清单，经白名单、黑名单、类型边界三重网关后执行；回执只显示已改/已拒，不生成叙事。</p>
          <p>黑名单含案件状态与量刑结论、时间引擎常量、存档结构、价格锚点表、chance封顶参数与天机系统自身。</p>
          <div class="settings-actions">
            <button type="button" id="restoreTianjiButton">回溯上一会话</button>
            <button type="button" id="closeTianjiButton">关闭天机</button>
          </div>
          <pre id="tianjiReceipt" class="tianji-receipt">天机无声。</pre>
          <div id="tianjiLog"></div>
        </div>
        <div class="audit-log hidden" id="auditLog"></div>
      </div>
    </div>

    <div class="death-overlay hidden" id="deathOverlay" role="dialog" aria-modal="true" aria-labelledby="deathTitle">
      <div class="death-card">
        <h2 id="deathTitle">身死临安</h2>
        <p id="deathReason">你饿死了。</p>
        <p id="survivalDays">存活 0 天</p>
        <button type="button" id="deathRestartButton">重开</button>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
